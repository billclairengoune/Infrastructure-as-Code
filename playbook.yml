---
# -------------------------------------------------------------
#              Durcissement Système
# -------------------------------------------------------------

- hosts: all
  become: true

  vars:
    ufw_public_tcp_ports:
      - 22
      - 443
    fail2ban_package_name: fail2ban
    fail2ban_service_name: fail2ban
    fail2ban_ignoreip:
      - 127.0.0.1/8
      - ::1
    fail2ban_bantime: "1h"
    fail2ban_findtime: "10m"
    fail2ban_maxretry: 5
    tailscale_auth_key: "tskey-xxxxxxxxxxxxxxxx"

  tasks:
    # ---------------Installation de Sudo et ajout de l'utilisateur dans le group sudo ------

    - name: Installer sudo
      ansible.builtin.apt:
        name: sudo
        state: present
        update_cache: yes

    - name: Debug Installer sudo
      ansible.builtin.debug:
        msg: "OK"

    - name: Ajouter l'utilisateur courant au groupe sudo
      ansible.builtin.user:
        name: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
        groups: sudo
        append: yes

    - name: Debug Ajouter l'utilisateur courant au groupe sudo
      ansible.builtin.debug:
        msg: "OK"

    # --------------Installation du service ssh---------------

    - name: Installer openssh-server
      ansible.builtin.apt:
        name: openssh-server
        state: present

    - name: Debug Installer openssh-server
      ansible.builtin.debug:
        msg: "OK"

    - name: Activer et démarrer le service ssh
      ansible.builtin.service:
        name: ssh
        enabled: true
        state: started

    - name: Debug Activer et démarrer le service ssh
      ansible.builtin.debug:
        msg: "OK"

    # ------------ Mise à jour complète du système ---------------

    - name: Update package cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Debug Update package cache
      ansible.builtin.debug:
        msg: "OK"

    - name: Upgrade packages
      ansible.builtin.apt:
        upgrade: dist

    - name: Debug Upgrade packages
      ansible.builtin.debug:
        msg: "OK"

    - name: Remove unused packages
      ansible.builtin.apt:
        autoremove: yes
        purge: yes

    - name: Debug Remove unused packages
      ansible.builtin.debug:
        msg: "OK"

    # ---------Désactivation de la connexion ssh root-------------

    - name: Disable ssh root login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^\s*#?\s*PermitRootLogin\s+'
        line: 'PermitRootLogin no'
        backup: true

    - name: Debug Disable ssh root login
      ansible.builtin.debug:
        msg: "OK"

    - name: Restart SSH
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Debug Restart SSH
      ansible.builtin.debug:
        msg: "OK"

    # ---------Désactivation de l'authentification SSH par mot de passe--------

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        dest: /etc/ssh/sshd_config
        regexp: '^#?\s*PasswordAuthentication\s'
        line: 'PasswordAuthentication no'
        state: present

    - name: Debug Disable SSH password authentication
      ansible.builtin.debug:
        msg: "OK"

    - name: Restart SSH after password auth change
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Debug Restart SSH after password auth change
      ansible.builtin.debug:
        msg: "OK"

    # ----------Configuration UFW : règles minimales justifiées----------------

    # Vérifier que UFW est installé

    - name: Ensure UFW is installed
      ansible.builtin.package:
        name: ufw
        state: present

    - name: Debug Ensure UFW is installed
      ansible.builtin.debug:
        msg: "OK"

    # Interdire le trafic entrant

    - name: Default deny all incoming traffic
      community.general.ufw:
        direction: incoming
        default: deny

    - name: Debug Default deny all incoming traffic
      ansible.builtin.debug:
        msg: "OK"

    # Autoriser le trafic sortant

    - name: Default allow all outgoing traffic
      community.general.ufw:
        direction: outgoing
        default: allow

    - name: Debug Default allow all outgoing traffic
      ansible.builtin.debug:
        msg: "OK"

    # Autoriser la connexion ssh

    - name: Allow openssh
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Debug Allow openssh
      ansible.builtin.debug:
        msg: "OK"

    # Autoriser les ports TCP nécessaires

    - name: Allow required public TCP ports
      community.general.ufw:
        rule: allow
        proto: tcp
        to_port: "{{ item }}"
        comment: "Public service port"
      loop: "{{ ufw_public_tcp_ports }}"

    - name: Debug Allow required public TCP ports
      ansible.builtin.debug:
        msg: "OK"

    - name: Set low logging
      community.general.ufw:
        logging: low

    - name: Debug Set low logging
      ansible.builtin.debug:
        msg: "OK"

    # Activer UFW

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Debug Enable UFW
      ansible.builtin.debug:
        msg: "OK"

    # ------------------Installation et configuration de fail2ban (protection SSH, seuils à définir)-------------------------

    - name: Installer Fail2ban
      ansible.builtin.package:
        name: "{{ fail2ban_package_name }}"
        state: present

    - name: Debug Installer Fail2ban
      ansible.builtin.debug:
        msg: "OK"

    - name: Créer le répertoire de configuration locale Fail2ban
      ansible.builtin.file:
        path: /etc/fail2ban/jail.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Debug Créer le répertoire de configuration locale Fail2ban
      ansible.builtin.debug:
        msg: "OK"

    - name: Configurer la jail SSH
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/sshd.local
        owner: root
        group: root
        mode: "0644"
        content: |
          [DEFAULT]
          ignoreip = {{ fail2ban_ignoreip | join(' ') }}
          bantime  = {{ fail2ban_bantime }}
          findtime = {{ fail2ban_findtime }}
          maxretry = {{ fail2ban_maxretry }}

          [sshd]
          enabled = true
          port    = ssh
      notify: Redémarrer Fail2ban

    - name: Debug Configurer la jail SSH
      ansible.builtin.debug:
        msg: "OK"

    - name: Activer et démarrer Fail2ban
      ansible.builtin.service:
        name: "{{ fail2ban_service_name }}"
        enabled: true
        state: started

    - name: Debug Activer et démarrer Fail2ban
      ansible.builtin.debug:
        msg: "OK"

    - name: Afficher la configuration choisie
      ansible.builtin.debug:
        msg:
          - "Fail2ban installé et activé"
          - "Protection SSH activée"
          - "ignoreip = {{ fail2ban_ignoreip | join(' ') }}"
          - "bantime = {{ fail2ban_bantime }}"
          - "findtime = {{ fail2ban_findtime }}"
          - "maxretry = {{ fail2ban_maxretry }}"

    - name: Debug Afficher la configuration choisie
      ansible.builtin.debug:
        msg: "OK"

    # ----------------------Installation et configuration de Tailscale-------------------------

    - name: Télécharger le script d'installation Tailscale
      ansible.builtin.get_url:
        url: https://tailscale.com/install.sh
        dest: /tmp/tailscale-install.sh
        mode: "0755"

    - name: Installer Tailscale
      ansible.builtin.command:
        cmd: sh /tmp/tailscale-install.sh

    - name: Connecter la machine à Tailscale
      ansible.builtin.command:
        cmd: tailscale up --auth-key={{ tailscale_auth_key }}
      no_log: true

    - name: Vérifier le statut Tailscale
      ansible.builtin.command:
        cmd: tailscale status
      register: tailscale_status
      changed_when: false

    - name: Afficher le statut Tailscale
      ansible.builtin.debug:
        var: tailscale_status.stdout_lines

    # --------------------------Activation des mises à jour automatiques de sécurité (unattended-upgrades)-------------------------------

    - name: Installer unattended-upgrades
      ansible.builtin.apt:
        name: unattended-upgrades
        state: present
        update_cache: yes

    - name: Activer les mises à jour automatiques
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
        owner: root
        group: root
        mode: "0644"

    - name: Autoriser uniquement les mises à jour de sécurité
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Origins-Pattern {
              "origin=Debian,codename=${distro_codename},label=Debian-Security";
          };
        owner: root
        group: root
        mode: "0644"

    - name: Afficher OK
      ansible.builtin.debug:
        msg: "OK"

    # --------------------------Audit avec Lynis et OpenSCAP-----------------------------------

    # Installation de Lynis et OpenSCAP

    - name: Installer Lynis et OpenSCAP
      ansible.builtin.apt:
        name:
          - lynis
          - openscap-scanner
        state: present

    # Audit avec Lynis

    - name: Créer un dossier pour les rapports
      ansible.builtin.file:
        path: /var/log/audit
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Lancer Lynis et générer un rapport
      ansible.builtin.command: lynis audit system --quiet
      register: lynis_result
      changed_when: false

    - name: Sauvegarder la sortie Lynis
      ansible.builtin.copy:
        content: "{{ lynis_result.stdout }}"
        dest: /var/log/audit/lynis-report.txt
        owner: root
        group: root
        mode: "0644"

    # Audit avec OpenSCAP

    - name: Lancer un audit OpenSCAP
      ansible.builtin.command: >
        oscap xccdf eval
        --profile xccdf_org.ssgproject.content_profile_standard
        --results /var/log/audit/openscap-results.xml
        --report /var/log/audit/openscap-report.html
        /usr/share/xml/scap/ssg/content/ssg-debian12-ds.xml
      changed_when: false

  handlers:
    - name: Redémarrer Fail2ban
      ansible.builtin.service:
        name: "{{ fail2ban_service_name }}"
        state: restarted
